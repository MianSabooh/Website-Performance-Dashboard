ce metrics.</p><h4>Data Description</h4><p>The dataset, <code><strong>website_performance_analytics.csv</strong></code>, contains the following variables:</p><ul><li><p><strong>Visitor_ID:</strong> Unique identifier for each visitor.</p></li><li><p><strong>Page_Views:</strong> Number of pages viewed by the visitor during a session.</p></li><li><p><strong>Session_Duration:</strong> Duration of the session in seconds.</p></li><li><p><strong>Bounce_Rate:</strong> Percentage of visitors who leave the site after viewing only one page.</p></li><li><p><strong>Conversion_Rate:</strong> Percentage of visitors who complete a desired action (e.g., purchase, sign-up).</p></li><li><p><strong>Traffic_Source:</strong> Source from which the visitor arrived at the website (e.g., Direct, Organic Search, Paid Search).</p></li><li><p><strong>Exit_Pages:</strong> Pages from which visitors exit the site.</p></li><li><p><strong>Load_Time:</strong> Time taken to load the webpage.</p></li><li><p><strong>Visitor_Type:</strong> Type of visitor (e.g., New, Returning).</p></li><li><p><strong>Location:</strong> Geographic location of the visitor.</p></li></ul><h4>Instructions</h4><ol><li><p><strong>Data Preparation</strong></p><ul><li><p>Download the dataset from the resources section.</p></li><li><p>Load the <code>website_performance_analytics.csv</code> dataset into Power BI.</p></li><li><p>Convert the variables <strong>Bounce_Rate</strong> and <strong>Conversion_Rate</strong> into percentage format and reduce the decimal points to zero.</p></li><li><p>Assign the data category \"City\" for the variable <strong>Location</strong>.</p></li></ul></li><li><p><strong>Dashboard Creation</strong></p><ul><li><p>Assign the title “Website Performance Dashboard”.</p></li><li><p>Use the variable <strong>Exit_Page</strong> as the key filter within the title bar.</p></li><li><p>Assign KPI cards for the variables <strong>Page_Views</strong>, <strong>Session_Duration</strong>, <strong>Bounce_Rate</strong>, and <strong>Conversion_Rate</strong>. Summarize the data values as average values.</p></li><li><p>Create the following visuals:</p><ul><li><p>Two donut charts to show average <strong>Bounce_Rate</strong> and <strong>Conversion_Rate</strong> by <strong>Visitor_Type</strong> separately.</p></li><li><p>A bar chart showing average <strong>Conversion_Rate</strong> by <strong>Traffic_Source</strong>.</p></li><li><p>A map chart showing average <strong>Conversion_Rate</strong> by <strong>Location</strong>.</p></li><li><p>A table chart with the columns <strong>Visitor_ID</strong>, <strong>Page_Views</strong>, <strong>Session_Duration</strong>, and <strong>Conversion_Rate</strong>. Summarize <strong>Page_Views</strong>, <strong>Session_Duration</strong>, and <strong>Conversion_Rate</strong> by their average values. Sort <strong>Conversion_Rate</strong> values in descending format. Include cell elements within all the columns except <strong>Visitor_ID</strong>. Filter the top 100 visitors by average <strong>Conversion_Rate</strong>.</p></li></ul></li><li><p>Design your dashboard creatively, ensuring it is both informative and visually appealing.</p></li></ul></li></ol><h4>Conclusion</h4><p>By following these instructions, you will create a comprehensive dashboard that provides a clear overview of website performance metrics. This dashboard will help in identifying trends, understanding user behavior, and making data-driven decisions to optimize website performance. Good luck and happy analyzing!</p>","asset":null,"display_type":"text"}]},"solution_res":{"count":1,"next":null,"previous":null,"results":[{"_class":"practice_component","id":536721,"body":"","asset":{"_class":"asset","id":57699539,"asset_type":"File","title":"Solution - Website performance dashboard.pbix","created":"2024-07-05T20:22:48Z","status":1,"captions":[],"body":"","external_url":"","is_external":false,"filename":"Solution-Website-performance-dashboard.pbix","media_license_token":null,"media_sources":[],"course
